<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>登录 · ClassPet</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh;display:flex;flex-direction:column;background:#f5fdf7}
/* ── Breadcrumb ── */
.breadcrumb{padding:16px 20px;font-size:13px;color:#888}
.breadcrumb a{color:#2e7d32;text-decoration:none;font-weight:600}
.breadcrumb a:hover{text-decoration:underline}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:24px;padding:40px 28px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,.06);text-align:center}
.logo{font-size:56px;margin-bottom:6px}
.title{font-size:26px;font-weight:800;color:#2e7d32;margin-bottom:6px}
.sub{font-size:13px;color:#999;margin-bottom:28px}
.tabs{display:flex;gap:2px;background:#f1f8e9;border-radius:12px;padding:4px;margin-bottom:24px}
.tab{flex:1;padding:10px;border-radius:10px;border:none;background:none;font-size:14px;font-weight:600;color:#888;cursor:pointer;transition:.2s}
.tab.on{background:#fff;color:#2e7d32;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.input{width:100%;padding:13px 16px;border:2px solid #e8e8e8;border-radius:14px;font-size:16px;margin-bottom:10px;outline:none;transition:.2s}
.input:focus{border-color:#66bb6a}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#43a047,#2e7d32);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:6px;transition:.2s}
.btn:active{transform:scale(.97)}
.msg{margin-top:10px;font-size:13px;min-height:18px}
.msg.ok{color:#2e7d32}
.msg.err{color:#c62828}
.foot{font-size:12px;color:#aaa;margin-top:16px}
.foot a{color:#2e7d32;text-decoration:none}
/* ── Footer ── */
footer{text-align:center;padding:20px;font-size:12px;color:#aaa;border-top:1px solid #f0f0f0}
footer a{color:#999;text-decoration:none;margin:0 6px}
footer a:hover{color:#555}
</style>
</head>
<body>

<div class="breadcrumb"><a href="/">ClassPet</a> / <span id="pageTitle">登录</span></div>

<div class="main">
<div class="card">
  <div class="logo">🐾</div>
  <div class="title">ClassPet</div>
  <div class="sub">记录成长 · 积累爱心 · 共享快乐</div>
  <div class="tabs">
    <button class="tab on" onclick="switchTab(1)">登录</button>
    <button class="tab" onclick="switchTab(2)">注册</button>
  </div>
  <input class="input" id="phone" type="tel" placeholder="手机号" maxlength="11">
  <input class="input" id="password" type="password" placeholder="密码">
  <input class="input" id="name" type="text" placeholder="怎么称呼你？" style="display:none">
  <button class="btn" id="submitBtn" onclick="submit()">登录</button>
  <div class="msg" id="msg"></div>
  <div class="foot" id="footLink"><a href="#" onclick="switchTab(2);return false">还没有账号？立即注册</a></div>
</div>
</div>

<footer>
  <a href="#">隐私政策</a><a href="#">服务条款</a>
  <div style="margin-top:4px">© 2026 ClassPet</div>
</footer>

<script>
let mode=1;
function switchTab(n){
  mode=n;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.tab')[n-1].classList.add('on');
  document.getElementById('name').style.display=n===2?'block':'none';
  document.getElementById('submitBtn').textContent=n===1?'登录':'注册';
  document.getElementById('msg').textContent='';
  document.getElementById('pageTitle').textContent=n===1?'登录':'注册';
  document.getElementById('footLink').innerHTML=n===1
    ? '<a href="#" onclick="switchTab(2);return false">还没有账号？立即注册</a>'
    : '<a href="#" onclick="switchTab(1);return false">已有账号？前往登录</a>';
}
async function submit(){
  const phone=document.getElementById('phone').value.trim();
  const password=document.getElementById('password').value;
  const name=document.getElementById('name').value.trim();
  const msg=document.getElementById('msg');
  if(!phone||!password){msg.className='msg err';msg.textContent='请填写手机号和密码';return}
  try{
    const url=mode===1?'/api/login':'/api/register';
    const body=mode===1?{phone,password}:{phone,password,name};
    const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    if(d.ok){msg.className='msg ok';msg.textContent='登录成功，跳转中...';
    const dest = d.teacher?.role==='school_admin' ? '/school' : '/teacher';
    setTimeout(()=>location.href=dest,500)}
    else{msg.className='msg err';msg.textContent=d.error}
  }catch(e){msg.className='msg err';msg.textContent='网络错误，请重试'}
}
</script>
</body>
</html>
