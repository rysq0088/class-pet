<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>ClassPet - 班级宠物</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(180deg,#e8f5e9 0%,#c8e6c9 50%,#a5d6a7 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:24px;padding:40px 28px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.08);text-align:center}
.logo{font-size:64px;margin-bottom:8px}
.title{font-size:28px;font-weight:800;color:#2e7d32;margin-bottom:4px}
.sub{font-size:14px;color:#666;margin-bottom:32px}
.tabs{display:flex;gap:2px;background:#f1f8e9;border-radius:12px;padding:4px;margin-bottom:28px}
.tab{flex:1;padding:10px;border-radius:10px;border:none;background:none;font-size:15px;font-weight:600;color:#888;cursor:pointer;transition:.2s}
.tab.on{background:#fff;color:#2e7d32;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.input{width:100%;padding:14px 16px;border:2px solid #e0e0e0;border-radius:14px;font-size:16px;margin-bottom:12px;outline:none;transition:.2s}
.input:focus{border-color:#66bb6a}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#43a047,#2e7d32);color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:700;cursor:pointer;margin-top:8px;transition:.2s}
.btn:active{transform:scale(.97)}
.msg{margin-top:12px;font-size:13px;min-height:20px}
.msg.ok{color:#2e7d32}
.msg.err{color:#c62828}
.foot{font-size:12px;color:#999;margin-top:20px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🐾</div>
  <div class="title">ClassPet</div>
  <div class="sub">好习惯，养出来</div>
  <div class="tabs">
    <button class="tab on" onclick="switchTab(1)">登录</button>
    <button class="tab" onclick="switchTab(2)">注册</button>
  </div>
  <input class="input" id="phone" type="tel" placeholder="手机号" maxlength="11">
  <input class="input" id="password" type="password" placeholder="密码">
  <input class="input" id="name" type="text" placeholder="怎么称呼你？" style="display:none">
  <button class="btn" id="submitBtn" onclick="submit()">登录</button>
  <div class="msg" id="msg"></div>
  <div class="foot">🦊 让孩子的好习惯被看见</div>
</div>
<script>
let mode=1;
function switchTab(n){mode=n;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));document.querySelectorAll('.tab')[n-1].classList.add('on');document.getElementById('name').style.display=n===2?'block':'none';document.getElementById('submitBtn').textContent=n===1?'登录':'注册';document.getElementById('msg').textContent=''}
async function submit(){
  const phone=document.getElementById('phone').value.trim();
  const password=document.getElementById('password').value;
  const name=document.getElementById('name').value.trim();
  const msg=document.getElementById('msg');
  if(!phone||!password){msg.className='msg err';msg.textContent='请填写手机号和密码';return}
  try{
    const url=mode===1?'/api/login':'/api/register';
    const body=mode===1?{phone,password}:{phone,password,name};
    const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    if(d.ok){msg.className='msg ok';msg.textContent='登录成功，跳转中...';setTimeout(()=>location.href='/teacher',500)}
    else{msg.className='msg err';msg.textContent=d.error}
  }catch(e){msg.className='msg err';msg.textContent='网络错误，请重试'}
}
</script>
</body>
</html>
