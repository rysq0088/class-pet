<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>宠物乐园 - ClassPet</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

/* ═══ ANIMATIONS — Breathing, continuous, no pauses ═══ */
@keyframes petBreath{
  0%{transform:translateY(0) scale(1)}
  12%{transform:translateY(-4px) scale(1.03)}
  25%{transform:translateY(-6px) scale(1.05)}
  37%{transform:translateY(-3px) scale(1.02)}
  50%{transform:translateY(0) scale(1)}
  62%{transform:translateY(3px) scale(0.98)}
  75%{transform:translateY(4px) scale(0.97)}
  87%{transform:translateY(2px) scale(0.98)}
  100%{transform:translateY(0) scale(1)}
}
@keyframes petKingBounce{
  0%{transform:translateY(0) scale(1.12)}
  15%{transform:translateY(-10px) scale(1.16)}
  30%{transform:translateY(-5px) scale(1.14)}
  45%{transform:translateY(-12px) scale(1.18)}
  60%{transform:translateY(-2px) scale(1.13)}
  75%{transform:translateY(5px) scale(1.11)}
  90%{transform:translateY(1px) scale(1.12)}
  100%{transform:translateY(0) scale(1.12)}
}
@keyframes badgePulse{
  0%{box-shadow:0 0 0 0 rgba(255,152,0,.4)}
  30%{box-shadow:0 0 0 6px rgba(255,152,0,.2)}
  60%{box-shadow:0 0 0 2px rgba(255,152,0,.3)}
  100%{box-shadow:0 0 0 0 rgba(255,152,0,.4)}
}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(1) rotate(0deg)}
  30%{opacity:1;transform:translateY(-20px) scale(1.2) rotate(15deg)}
  70%{opacity:.6;transform:translateY(-50px) scale(.8) rotate(-10deg)}
  100%{opacity:0;transform:translateY(-80px) scale(.3) rotate(0deg)}
}
@keyframes shopIn{
  0%{opacity:0;transform:scale(.85) translateY(8px)}
  60%{transform:scale(1.03) translateY(-2px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}
@keyframes slideUp{
  0%{opacity:0;transform:translateY(16px)}
  100%{opacity:1;transform:translateY(0)}
}
@keyframes starOrbit{
  from{transform:rotate(0deg) translateX(55px)}
  to{transform:rotate(360deg) translateX(55px)}
}

:root{--g1:#43A047;--g2:#66BB6A;--g3:#81C784;--gold:#FFA000;--pink:#EC407A;--blue:#42A5F5;--bg:#F1F8E9}

body{font-family:'PingFang SC','Microsoft YaHei',-apple-system,sans-serif;
  background:linear-gradient(180deg,#E3F2FD 0%,#BBDEFB 20%,#C8E6C9 55%,#A5D6A7 75%,#81C784 100%);
  min-height:100vh;max-width:500px;margin:0 auto;color:#333;overflow-x:hidden}

/* ═══ TOP BAR ═══ */
.top-bar{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:12px;
  padding:12px 18px;background:rgba(255,255,255,.88);backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(0,0,0,.04)}
.top-bar .back{font-size:24px;cursor:pointer;border:none;background:none;line-height:1;padding:2px}
.top-bar .ttl{font-size:16px;font-weight:800;flex:1}
.top-bar .cls{font-size:11px;color:#999}

/* ═══ PET HERO ═══ */
.hero{padding:20px 20px 8px;text-align:center}
.hero .pet-box{position:relative;display:inline-block;margin-bottom:8px}
.hero .pet-emoji{font-size:110px;display:block;
  animation:petBreath 3.5s cubic-bezier(0.4,0,0.6,1) infinite;
  filter:drop-shadow(0 8px 20px rgba(0,0,0,.1))}
.hero .pet-emoji.lv5{animation:petKingBounce 3s cubic-bezier(0.4,0,0.6,1) infinite;
  filter:drop-shadow(0 8px 24px rgba(255,215,0,.3))}
/* Star ring */
.hero .stars{position:absolute;inset:-10px;pointer-events:none}
.hero .star-orbit{position:absolute;width:12px;height:12px;font-size:12px}
.hero .star-orbit.s1{top:0;left:calc(50% - 6px);animation:starOrbit 5s linear infinite}
.hero .star-orbit.s2{top:30%;right:0;animation:starOrbit 5s linear 1.7s infinite}
.hero .star-orbit.s3{bottom:0;left:calc(50% - 6px);animation:starOrbit 5s linear 3.3s infinite}

.hero .pet-name{font-size:15px;color:#666;margin-top:2px}
.hero .level-badge{display:inline-block;padding:6px 20px;border-radius:20px;font-size:14px;
  font-weight:800;color:#fff;background:linear-gradient(135deg,#FFB300,#FF6F00);
  box-shadow:0 3px 14px rgba(255,111,0,.3);margin-top:8px}
.hero .level-badge.lv5{background:linear-gradient(135deg,#FFD700,#FF6D00);animation:badgePulse 3s ease-in-out infinite}
.hero .level-badge.lv1{background:linear-gradient(135deg,#81C784,#4CAF50)}
.hero .level-badge.lv2{background:linear-gradient(135deg,#AED581,#8BC34A)}

/* Particle burst */
.particle{position:absolute;pointer-events:none;font-size:22px;z-index:50;
  animation:floatUp 1.2s ease-out forwards}

/* ═══ SCORE CARDS ═══ */
.stats{display:flex;gap:10px;padding:0 18px 10px}
.stat-card{flex:1;background:rgba(255,255,255,.9);border-radius:18px;padding:14px;
  text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.04)}
.stat-card .num{font-size:26px;font-weight:900;color:var(--g1)}
.stat-card .lbl{font-size:11px;color:#aaa;margin-top:3px}
.stat-card.accent .num{color:#E65100}

/* ═══ EXP BAR ═══ */
.exp-sec{padding:0 18px 12px}
.exp-wrap{background:rgba(255,255,255,.7);border-radius:12px;height:14px;overflow:hidden;
  box-shadow:inset 0 2px 4px rgba(0,0,0,.04)}
.exp-fill{height:100%;border-radius:12px;background:linear-gradient(90deg,#FFD54F,#FF8F00,#FF6D00);
  transition:width .8s cubic-bezier(0.4,0,0.2,1);position:relative}
.exp-fill::after{content:'';position:absolute;right:0;top:0;bottom:0;width:18px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.45))}
.exp-lbl{display:flex;justify-content:space-between;font-size:11px;color:#999;margin-top:4px;padding:0 4px}

/* ═══ CARDS ═══ */
.card{background:rgba(255,255,255,.9);border-radius:22px;padding:18px;
  margin:0 14px 14px;box-shadow:0 4px 20px rgba(0,0,0,.04);animation:slideUp .45s ease-out}

/* ═══ SHOP ═══ */
.sh-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sh-hdr .sh-ttl{font-size:16px;font-weight:800}
.sh-hdr .bal{font-size:13px;color:var(--gold);font-weight:700;background:#FFF8E1;padding:4px 14px;border-radius:14px}
.sh-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.sh-tab{padding:7px 15px;border-radius:16px;font-size:13px;font-weight:600;white-space:nowrap;
  border:1.5px solid #ddd;background:#fff;cursor:pointer;transition:.2s}
.sh-tab.on{background:#FFF3E0;border-color:#FFB300;color:#E65100}

.sh-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sh-item{background:#fafafa;border-radius:16px;padding:16px 10px;text-align:center;
  cursor:pointer;border:2px solid transparent;transition:all .2s cubic-bezier(0.4,0,0.6,1);
  animation:shopIn .4s ease-out forwards;opacity:0}
.sh-item:active{transform:scale(.94)}
.sh-item:hover{border-color:#FFB300;background:#FFFDE7}
.sh-item.owned{background:#f3f3f3;border-color:#eee;cursor:default;opacity:.65}
.sh-item .si-icon{font-size:38px;display:block;margin-bottom:4px}
.sh-item .si-n{font-size:14px;font-weight:700;color:#333}
.sh-item .si-c{font-size:12px;font-weight:700;color:#E65100;margin-top:2px}
.sh-item .si-d{font-size:10px;color:#bbb;margin-top:1px}

/* ═══ HISTORY ═══ */
.h-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid rgba(0,0,0,.04)}
.h-row:last-child{border:none}
.h-icon{width:34px;height:34px;border-radius:50%;background:#E8F5E9;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.h-body{flex:1;min-width:0}
.h-reason{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.h-date{font-size:11px;color:#ccc}
.h-pts{font-size:18px;font-weight:900;color:var(--g1);flex-shrink:0}

/* ═══ PURCHASES ═══ */
.p-row{display:flex;align-items:center;gap:8px;padding:8px 0;font-size:13px;border-bottom:1px dashed #eee}
.p-icon{font-size:22px}.p-name{flex:1}.p-cost{color:#E65100;font-weight:700}

/* ═══ TOAST ═══ */
.toast{position:fixed;top:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;
  padding:12px 28px;border-radius:24px;font-size:15px;font-weight:700;z-index:300;
  opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.2)}
.toast.show{opacity:1}
.toast.feast{background:#FF6D00}

.empty-state{text-align:center;padding:24px;color:#ccc;font-size:14px}
.empty-state .big{font-size:42px;display:block;margin-bottom:8px}

#loading{text-align:center;padding:120px 20px}
#loading .egg{font-size:64px;display:block;animation:petBreath 2s cubic-bezier(0.4,0,0.6,1) infinite}
#loading p{margin-top:14px;font-size:16px;color:#999}
</style>
</head>
<body>
<div id="loading"><span class="egg">🥚</span><p>正在加载宠物…</p></div>
<div id="app" style="display:none"></div>
<div class="toast" id="toast"></div>

<script>
const parts = location.pathname.split('/');
const CODE = parts[2], STUDENT_ID = parts[3];
if (!CODE || !STUDENT_ID) location.href = '/';

const PET_MAP = {cat:'🐱',dog:'🐶',rabbit:'🐰',panda:'🐼',chick:'🐤',turtle:'🐢',hamster:'🐹',fox:'🦊',frog:'🐸',monkey:'🐵',bear:'🐻',penguin:'🐧'};

const SHOP = {
  food:[
    {k:'fish',n:'小鱼干',e:'🐟',c:2,d:'鲜美可口'},
    {k:'bone',n:'肉骨头',e:'🦴',c:3,d:'强身健体'},
    {k:'carrot',n:'胡萝卜',e:'🥕',c:2,d:'健康好吃'},
    {k:'apple',n:'红苹果',e:'🍎',c:1,d:'每日一果'},
    {k:'cake',n:'小蛋糕',e:'🧁',c:5,d:'超多经验!'},
    {k:'milk',n:'牛奶',e:'🥛',c:3,d:'快快长大'},
  ],
  toy:[
    {k:'ball',n:'小皮球',e:'⚽',c:10,d:'蹦蹦跳跳'},
    {k:'yarn',n:'毛线团',e:'🧶',c:12,d:'软软乎乎'},
    {k:'frisbee',n:'飞盘',e:'🥏',c:15,d:'飞到天上去'},
    {k:'puzzle',n:'积木',e:'🧩',c:18,d:'益智有趣'},
  ],
  dress:[
    {k:'bow',n:'蝴蝶结',e:'🎀',c:25,d:'好漂亮呀'},
    {k:'hat',n:'小帽子',e:'🎩',c:30,d:'绅士风度'},
    {k:'scarf',n:'小围巾',e:'🧣',c:28,d:'暖暖的'},
    {k:'glasses',n:'酷墨镜',e:'🕶️',c:35,d:'超级酷'},
  ],
  special:[
    {k:'crown',n:'皇冠',e:'👑',c:50,d:'宠物之王'},
    {k:'house',n:'小木屋',e:'🏠',c:80,d:'温暖的家'},
    {k:'rainbow',n:'彩虹光环',e:'🌈',c:150,d:'绚丽特效'},
    {k:'star',n:'闪耀之星',e:'💫',c:300,d:'冠军级别'},
  ]
};
const CATS = {food:'🍎 食物',toy:'🎾 玩具',dress:'👗 装扮',special:'🌟 珍品'};

let tab='food', data=null;

function pLvl(exp){
  if(exp>=350)return{n:'冠军',e:'👑',lv:6,nx:9999};
  if(exp>=200)return{n:'精英',e:'💎',lv:5,nx:350};
  if(exp>=100)return{n:'成年',e:'🌳',lv:4,nx:200};
  if(exp>=40)return{n:'少年',e:'🌿',lv:3,nx:100};
  if(exp>=10)return{n:'成长',e:'🌱',lv:2,nx:40};
  return{n:'幼崽',e:'🥚',lv:1,nx:10};
}
const BASE=[0,0,10,40,100,250];

async function load(){
  try{
    const r=await fetch('/api/student/'+CODE+'/'+STUDENT_ID);
    data=await r.json();
    if(data.error){document.getElementById('loading').innerHTML='<div class="empty-state"><span class="big">😢</span><p>小朋友不存在</p></div>';return}
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
    render();
  }catch(e){document.getElementById('loading').innerHTML='<p style="color:#999">加载失败，请刷新</p>'}
}

function render(){
  const d=data, pl=pLvl(d.pet_exp), e=PET_MAP[d.pet_type]||'🐱', nx=pl.nx;
  const base=BASE[pl.lv], pct=Math.min(100,Math.round((d.pet_exp-base)/Math.max(1,nx-base)*100));
  const owned=new Set((d.purchases||[]).map(p=>p.item_key));

  // History
  const hist=(d.score_logs||[]).map(l=>
    `<div class="h-row"><div class="h-icon">⭐</div><div class="h-body"><div class="h-reason">${l.reason||'表现优秀'}</div><div class="h-date">${l.date||''}</div></div><div class="h-pts">+${l.points}</div></div>`
  ).join('')||'<div class="empty-state"><span class="big">📋</span><p>还没有积分记录</p><p style="font-size:12px">好好表现赚积分吧！</p></div>';

  // Purchases
  const purs=(d.purchases||[]).map(p=>
    `<div class="p-row"><span class="p-icon">${p.item_emoji||'🛍️'}</span><span class="p-name">${p.item_name}</span><span class="p-cost">-${p.cost}分</span></div>`
  ).join('');

  // Shop
  const items=SHOP[tab]||[];
  const shopHTML=items.map((it,i)=>{
    const has=owned.has(it.k), isF=tab==='food';
    const ok=isF||!has;
    return`<div class="sh-item${has&&!isF?' owned':''}" style="animation-delay:${i*.06}s"${ok?` onclick="buy('${it.k}','${it.n}','${it.e}','${tab}',${it.c})"`:''}>
      <span class="si-icon">${it.e}</span><span class="si-n">${it.n}${has&&!isF?' ✅':''}</span>
      <span class="si-c">${has&&!isF?'已拥有':'💰'+it.c+'分'}</span><span class="si-d">${it.d||''}</span></div>`;
  }).join('');

  let starsHTML='';
  if(pl.lv>=4) starsHTML='<div class="stars"><span class="star-orbit s1">✨</span><span class="star-orbit s2">💫</span><span class="star-orbit s3">🌟</span></div>';

  document.getElementById('app').innerHTML=`
    <div class="top-bar">
      <button class="back" onclick="location.href='/'">←</button>
      <span class="ttl">${d.name}的宠物</span>
      <span class="cls">${d.class_name||''}</span>
    </div>
    <div class="hero">
      <div class="pet-box" id="petBox">
        <span class="pet-emoji lv${pl.lv}">${e}</span>
        ${starsHTML}
      </div>
      <div class="pet-name">${d.pet_name||e+d.name}</div>
      <span class="level-badge lv${pl.lv}">${pl.e} ${pl.n} · Lv.${pl.lv}</span>
    </div>
    <div class="stats">
      <div class="stat-card"><div class="num">⭐${d.score}</div><div class="lbl">可用积分</div></div>
      <div class="stat-card accent"><div class="num">${d.pet_exp}</div><div class="lbl">宠物经验</div></div>
    </div>
    <div class="exp-sec">
      <div class="exp-wrap"><div class="exp-fill" style="width:${pct}%"></div></div>
      <div class="exp-lbl"><span>${d.pet_exp}/${nx}</span><span>→ ${pl.n}</span></div>
    </div>

    <div class="card">
      <div class="sh-hdr"><span class="sh-ttl">🛒 宠物商店</span><span class="bal">⭐${d.score}</span></div>
      <div class="sh-tabs">${Object.entries(CATS).map(([k,v])=>`<button class="sh-tab${tab===k?' on':''}" onclick="swTab('${k}')">${v}</button>`).join('')}</div>
      <div class="sh-grid">${shopHTML}</div>
    </div>

    ${purs?`<div class="card"><div class="sh-hdr"><span class="sh-ttl">🛍️ 已拥有</span></div>${purs}</div>`:''}

    <div class="card">
      <div class="sh-hdr"><span class="sh-ttl">📋 积分记录</span></div>
      ${hist}
    </div>
  `;
}

function swTab(t){tab=t;render()}

async function buy(k,n,e,cat,cost){
  if(!confirm('确认购买 '+n+'？\n花费 ⭐'+cost+' 积分'))return;
  try{
    const r=await fetch('/api/student/'+CODE+'/'+STUDENT_ID+'/buy',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({item_key:k,item_name:n,item_emoji:e,category:cat,cost})
    });
    const j=await r.json();
    if(j.ok){
      data=j.student;
      if(cat==='food'){
        const box=document.getElementById('petBox');
        const foods=['🍎','🍖','🥕','💖','✨','🌟'];
        for(let i=0;i<6;i++)setTimeout(()=>{
          const p=document.createElement('span');p.className='particle';
          p.textContent=foods[i];
          p.style.cssText=`left:${20+Math.random()*60}%;top:${10+Math.random()*40}%;position:absolute`;
          box.appendChild(p);
          setTimeout(()=>p.remove(),1300);
        },i*120);
      }
      render();
      toast(cat==='food'?'🍎 喂养成功！ +'+(cost*3)+'经验':(cat==='dress'?'👗 穿上新衣服！':(cat==='special'?'🌟 获得传说物品！':'🎉 购买成功！')),cat==='food');
    }else toast('❌ '+j.error,false);
  }catch(e){toast('网络错误',false)}
}

function toast(msg,feast){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast'+(feast?' feast':'')+' show';
  setTimeout(()=>el.classList.remove('show'),2200);
}

load();
</script>


</body>
</html>
