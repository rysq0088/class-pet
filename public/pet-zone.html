<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassPet.site — 班级宠物积分管理系统</title>
<style>
/* ============================================================
   Pet-Zone v3 — 对标 classpet.me 3D 宠物设计
   核心技法：CSS球体渲染 + 径向聚光 + 轮廓投影 + 呼吸动画
   ============================================================ */

/* ---------- CSS Variables ---------- */
:root {
  --font: "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
  --topbar-h: 60px; --tabbar-h: 68px; --maxw: 1240px;
  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-soft: cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="light"] {
  --bg: #fcfcd5;
  --card-bg: #fff8df;
  --card-inner-top: #ffffff;
  --text: #3d3226;
  --text-2: #6b5d4a;
  --text-3: #a89880;
  --border: rgba(255,255,255,0.7);
  --shadow-card: 0 16px 34px rgba(234,187,92,0.20);
  --shadow-card-hover: 0 22px 44px rgba(234,187,92,0.28);
  --overlay: rgba(50,30,10,0.35);
  --tab-active: #e8910a;
  --tab-inactive: #b8a088;
  --progress-bg: rgba(0,0,0,0.06);
}

[data-theme="dark"] {
  --bg: #1a1610;
  --card-bg: #2a2218;
  --card-inner-top: #332a1e;
  --text: #e8dcc8;
  --text-2: #b8a48e;
  --text-3: #7a6a55;
  --border: rgba(255,255,255,0.08);
  --shadow-card: 0 16px 34px rgba(0,0,0,0.40);
  --shadow-card-hover: 0 22px 44px rgba(0,0,0,0.55);
  --overlay: rgba(0,0,0,0.65);
  --tab-active: #f5a623;
  --tab-inactive: #6a5a45;
  --progress-bg: rgba(255,255,255,0.08);
}

/* ---------- Pet Color Palettes ---------- */
.pet-cat    { --pet-main: #ff9966; --pet-dark: #cc6633; --pet-light: #ffccaa; }
.pet-dog    { --pet-main: #f5a623; --pet-dark: #c47c0a; --pet-light: #ffe0a0; }
.pet-rabbit { --pet-main: #ff8eb3; --pet-dark: #cc5577; --pet-light: #ffd0e0; }
.pet-panda  { --pet-main: #7ec850; --pet-dark: #4a8a2a; --pet-light: #c8f0b0; }
.pet-chick  { --pet-main: #ffd43b; --pet-dark: #ccaa00; --pet-light: #fff5c0; }
.pet-turtle { --pet-main: #4ecdc4; --pet-dark: #2a8a84; --pet-light: #b8f0ec; }
.pet-hamster{ --pet-main: #e0a458; --pet-dark: #b07030; --pet-light: #ffe8c8; }
.pet-fox   { --pet-main: #ff6b4a; --pet-dark: #cc4422; --pet-light: #ffc8b8; }

/* ---------- Base ---------- */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;overflow:hidden;height:100vh;
}
button{border:none;background:none;cursor:pointer;font:inherit;color:inherit}
input,select{font:inherit}

/* Dot pattern background */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.18;
  background-image:radial-gradient(circle at 1px 1px, #cbd5e1 1px, transparent 0);
  background-size:32px 32px;
}

/* Ambient light orbs */
body::after{
  content:'';position:fixed;z-index:0;pointer-events:none;
  top:-200px;right:-200px;width:800px;height:800px;
  background:radial-gradient(circle, rgba(255,200,100,0.12) 0%, transparent 70%);
  border-radius:50%;
}

/* ---------- Layout ---------- */
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh}

/* Topbar */
.topbar{
  position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;
  height:var(--topbar-h);padding:0 20px;
  background:rgba(255,255,255,0.72);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(0,0,0,0.04);gap:12px;
}
[data-theme="dark"] .topbar{background:rgba(30,26,18,0.85);border-bottom:1px solid rgba(255,255,255,0.06)}
.topbar-left{display:flex;align-items:center;gap:10px;flex:1}
.topbar-right{display:flex;align-items:center;gap:8px}
.logo-text{
  font-size:18px;font-weight:800;letter-spacing:-0.5px;
  background:linear-gradient(135deg,#e8910a,#f56b8c);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.select-wrap{position:relative}
.select-wrap select{
  appearance:none;padding:7px 30px 7px 12px;border:1px solid rgba(0,0,0,0.08);border-radius:10px;
  background:rgba(255,255,255,0.6);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;
}
.select-wrap select:hover{border-color:rgba(234,145,10,0.3);background:rgba(255,255,255,0.9)}
.select-wrap::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:11px;pointer-events:none}
.search-box{position:relative;flex:1;max-width:280px}
.search-box input{
  width:100%;padding:7px 14px 7px 34px;border:1px solid rgba(0,0,0,0.08);border-radius:10px;
  background:rgba(255,255,255,0.6);color:var(--text);font-size:13px;transition:all .2s;
}
.search-box input:focus{outline:none;border-color:rgba(234,145,10,0.4);box-shadow:0 0 0 3px rgba(234,145,10,0.08)}
.search-box::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px}
.btn-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .2s;color:var(--text-2)}
.btn-icon:hover{background:rgba(0,0,0,0.04);color:var(--text)}
.btn-ghost{padding:6px 12px;border-radius:10px;font-size:13px;color:var(--text-2);transition:all .2s}
.btn-ghost:hover{background:rgba(0,0,0,0.04);color:var(--text)}
.dropdown{position:relative}
.dropdown-menu{
  position:absolute;top:calc(100% + 6px);right:0;min-width:160px;
  background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);
  border:1px solid rgba(0,0,0,0.06);border-radius:14px;
  box-shadow:0 8px 30px rgba(0,0,0,0.10);padding:6px;z-index:200;display:none;
  animation:fadeIn .15s var(--ease-soft);
}
[data-theme="dark"] .dropdown-menu{background:rgba(40,34,24,0.95);border:1px solid rgba(255,255,255,0.08)}
.dropdown-menu button{display:block;width:100%;text-align:left;padding:8px 14px;border-radius:10px;font-size:13px;color:var(--text);transition:all .15s}
.dropdown-menu button:hover{background:rgba(0,0,0,0.04)}
.divider{height:1px;background:rgba(0,0,0,0.06);margin:4px 0}

/* VS Bar */
.vs-bar{
  display:flex;align-items:center;justify-content:center;gap:24px;padding:14px 24px;
  margin:0 auto 20px;max-width:var(--maxw);
  background:rgba(255,255,255,0.55);backdrop-filter:blur(12px);
  border-radius:18px;border:1px solid rgba(255,255,255,0.5);
  box-shadow:0 4px 16px rgba(0,0,0,0.04);
}
[data-theme="dark"] .vs-bar{background:rgba(40,34,24,0.7);border:1px solid rgba(255,255,255,0.06)}
.vs-team{display:flex;align-items:center;gap:8px}
.vs-team .name{font-size:14px;font-weight:600}
.vs-team .score{font-size:22px;font-weight:800;color:#e8910a}
.vs-vs{
  font-size:11px;font-weight:700;color:var(--text-3);
  background:rgba(0,0,0,0.03);padding:4px 14px;border-radius:99px;
}

/* Main Scroll */
.main-scroll{flex:1;overflow-y:auto;padding:12px 20px calc(var(--tabbar-h) + 20px);display:flex;justify-content:center}

/* Garden Grid */
.garden{max-width:var(--maxw);width:100%;display:grid;grid-template-columns:repeat(auto-fill, minmax(195px, 1fr));gap:16px;align-content:start}

/* =================================================================
   PET CARD — 对标 classpet.me 的 3D 质感公式
   ================================================================= */
.pet-card{
  position:relative;background:var(--card-bg);border-radius:28px;
  box-shadow:var(--shadow-card), inset 0 1px 0 rgba(255,255,255,0.92);
  border:1px solid var(--border);cursor:pointer;user-select:none;
  transition:all .35s var(--ease-soft);overflow:hidden;
  display:flex;flex-direction:column;
}
.pet-card:hover{
  transform:translateY(-4px);
  box-shadow:var(--shadow-card-hover), inset 0 1px 0 rgba(255,255,255,0.92);
}
.pet-card.selected{
  box-shadow:0 0 0 4px rgba(234,145,10,0.25), var(--shadow-card), inset 0 1px 0 rgba(255,255,255,0.92);
  border-color:rgba(234,145,10,0.5);
}
.pet-card.dragging{opacity:0.35;transform:scale(0.9)}
.pet-card.drag-over{
  box-shadow:0 0 0 4px rgba(99,102,241,0.3), var(--shadow-card);
  border-color:rgba(99,102,241,0.5);
}

/* ─── Pet Image Area (the "stage") ─── */
.pet-image-area{
  position:relative;min-height:210px;display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(circle at 50% 18%, rgba(255,255,255,0.96) 0%, rgba(255,255,255,0.68) 34%, rgba(255,246,218,0.78) 68%, rgba(255,239,186,0.72) 100%);
  overflow:visible;
}
[data-theme="dark"] .pet-image-area{
  background:radial-gradient(circle at 50% 18%, rgba(60,50,35,0.9) 0%, rgba(45,38,25,0.8) 34%, rgba(35,28,18,0.85) 68%, rgba(30,24,14,0.9) 100%);
}

/* ─── 3D Pet Orb ─── */
.pet-orb{
  position:relative;width:105px;height:105px;border-radius:50%;z-index:2;
  display:flex;align-items:center;justify-content:center;
  /* Sphere shading: light from top-left */
  background:radial-gradient(circle at 35% 28%,
    var(--pet-light) 0%,
    var(--pet-main) 35%,
    var(--pet-dark) 85%,
    color-mix(in srgb, var(--pet-dark) 50%, #000) 100%
  );
  box-shadow:
    /* rim light */
    inset 0 1px 0 rgba(255,255,255,0.5),
    /* core shadow */
    inset 0 -12px 28px rgba(0,0,0,0.22),
    /* drop shadow on ground */
    0 18px 28px rgba(80,85,112,0.16);
  filter:drop-shadow(0 8px 16px rgba(0,0,0,0.10));
  transition:all .35s var(--ease-soft);
}

/* Specular highlight (the glossy reflection) */
.pet-orb::before{
  content:'';position:absolute;z-index:3;
  top:14%;left:18%;width:32%;height:22%;border-radius:50%;
  background:radial-gradient(ellipse, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0.35) 50%, transparent 100%);
  transform:rotate(-18deg);
  pointer-events:none;
}

/* Sub-surface scattering rim */
.pet-orb::after{
  content:'';position:absolute;inset:3px;border-radius:50%;z-index:1;
  background:transparent;
  box-shadow:inset -2px -2px 8px rgba(255,255,255,0.15);
  pointer-events:none;
}

/* Pet emoji face */
.pet-face{
  position:relative;z-index:4;font-size:48px;line-height:1;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,0.12));
  transition:transform .3s var(--ease-soft);
  pointer-events:none;
}

/* Hover: slight bob+rotate */
.pet-card:hover .pet-orb{transform:scale(1.04) rotate(-2deg)}

/* ─── Breath Animation ─── */
@keyframes petBreath{
  0%  {transform:translateY(0) scale(1)}
  50% {transform:translateY(-8px) scale(1.03)}
  100%{transform:translateY(0) scale(1)}
}
.pet-orb.breathing{animation:petBreath 6s ease-in-out infinite}
.pet-card:nth-child(odd) .pet-orb.breathing{animation-delay:0s}
.pet-card:nth-child(even) .pet-orb.breathing{animation-delay:3s}

/* ─── Score Badge (右上，毛玻璃) ─── */
.pet-score-badge{
  position:absolute;top:10px;right:10px;z-index:10;
  display:flex;align-items:center;gap:3px;
  padding:4px 10px;border-radius:99px;
  background:rgba(255,255,255,0.70);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,224,173,0.6);
  box-shadow:0 9px 18px rgba(224,117,0,0.12);
  font-size:12px;font-weight:700;color:#c47c0a;
}
[data-theme="dark"] .pet-score-badge{
  background:rgba(40,34,24,0.7);border:1px solid rgba(255,224,173,0.25);
  color:#f5a623;
}

/* ─── Pet Name Tag (底部居中，毛玻璃) ─── */
.pet-name-tag{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:10;
  padding:3px 14px;border-radius:99px;
  background:rgba(255,255,255,0.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  box-shadow:0 8px 20px rgba(101,93,205,0.10);
  font-size:11px;font-weight:600;color:#6f63f4;white-space:nowrap;
}
[data-theme="dark"] .pet-name-tag{
  background:rgba(40,34,24,0.8);color:#a89bf0;
}

/* ─── Separator ─── */
.pet-sep{height:1px;margin:0;background:linear-gradient(90deg,transparent,rgba(0,0,0,0.06) 20%,rgba(0,0,0,0.06) 80%,transparent)}

/* ─── Bottom Info Area ─── */
.pet-info{
  padding:12px 14px 14px;display:flex;flex-direction:column;gap:8px;
  background:var(--card-inner-top);
  border-radius:0 0 27px 27px;
  box-shadow:0 -8px 24px rgba(255,255,255,0.78);
}
[data-theme="dark"] .pet-info{box-shadow:0 -8px 24px rgba(0,0,0,0.3)}
.student-name-row{display:flex;align-items:center;justify-content:space-between}
.student-name{font-size:14px;font-weight:700;color:var(--text)}
.student-number{font-size:11px;color:var(--text-3);font-weight:500}
.pet-level-row{display:flex;align-items:center;gap:6px}
.pet-level-icon{width:18px;height:18px}
.pet-level-icon svg{width:100%;height:100%}
.pet-level-text{font-size:11px;font-weight:600;color:#6f63f4}

/* Progress bar */
.exp-bar{width:100%;height:8px;border-radius:99px;background:var(--progress-bg);overflow:hidden}
.exp-fill{
  height:100%;border-radius:99px;
  background:linear-gradient(90deg, #9ba8ff 0%, #7c7af7 50%, #6357ef 100%);
  box-shadow:0 5px 12px rgba(99,87,239,0.28);
  transition:width .6s var(--ease-soft);
}
.exp-text{font-size:11px;color:var(--text-3);font-weight:500}

/* Stats row */
.stats-row{display:flex;gap:12px;font-size:11px;color:var(--text-2);font-weight:600}
.stats-row .stat{display:flex;align-items:center;gap:2px}

/* =================================================================
   TABBAR
   ================================================================= */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:center;
  height:var(--tabbar-h);
  background:rgba(255,255,255,0.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(0,0,0,0.04);gap:0;
}
[data-theme="dark"] .tabbar{background:rgba(30,26,18,0.85);border-top:1px solid rgba(255,255,255,0.06)}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;padding:8px 0;font-size:10px;font-weight:600;
  color:var(--tab-inactive);transition:all .25s var(--ease-soft);position:relative;
}
.tab-btn .tab-icon{
  width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:19px;transition:all .25s var(--ease-bounce);
}
.tab-btn.active{color:var(--tab-active)}
.tab-btn.active .tab-icon{
  background:rgba(234,145,10,0.10);transform:translateY(-2px);
}
.tab-btn:hover{color:var(--tab-active)}
.tab-btn:active .tab-icon{transform:scale(.88)}

/* =================================================================
   MODAL
   ================================================================= */
.overlay{
  position:fixed;inset:0;z-index:200;background:var(--overlay);
  display:flex;align-items:flex-end;justify-content:center;
  animation:fadeIn .2s var(--ease-soft);
}
.modal{
  background:rgba(255,255,255,0.97);backdrop-filter:blur(20px);
  border-radius:28px 28px 0 0;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;
  padding:24px 20px 40px;animation:slideUp .4s var(--ease-bounce);
  box-shadow:0 -12px 40px rgba(0,0,0,0.12);
}
[data-theme="dark"] .modal{background:rgba(35,30,20,0.97)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:19px;font-weight:700}
.modal-close{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-3);transition:all .2s}
.modal-close:hover{background:rgba(0,0,0,0.05);color:var(--text)}

/* =================================================================
   ACTION BAR
   ================================================================= */
.action-bar{
  position:fixed;bottom:calc(var(--tabbar-h) + 10px);left:50%;transform:translateX(-50%);z-index:150;
  display:flex;align-items:center;gap:8px;padding:10px 16px;
  background:rgba(255,255,255,0.92);backdrop-filter:blur(16px);
  border-radius:99px;box-shadow:0 8px 28px rgba(0,0,0,0.12);border:1px solid rgba(0,0,0,0.05);
  animation:slideUp .35s var(--ease-bounce);
}
[data-theme="dark"] .action-bar{background:rgba(40,34,24,0.92);border:1px solid rgba(255,255,255,0.08)}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:3px;
  padding:8px 15px;border-radius:99px;font-size:12px;font-weight:700;
  transition:all .2s;white-space:nowrap;
}
.btn-pos{background:#10b981;color:#fff;box-shadow:0 2px 8px rgba(16,185,129,0.3)}
.btn-pos:hover{background:#059669;transform:translateY(-1px)}
.btn-neg{background:#ef4444;color:#fff;box-shadow:0 2px 8px rgba(239,68,68,0.3)}
.btn-neg:hover{background:#dc2626;transform:translateY(-1px)}
.btn-ghost-sm{padding:6px 12px;border-radius:99px;font-size:11px;color:var(--text-3);font-weight:600}
.btn-ghost-sm:hover{background:rgba(0,0,0,0.04);color:var(--text)}

/* =================================================================
   SCORE POPUP
   ================================================================= */
@keyframes scorePop{
  0%  {opacity:0;transform:translateY(0) scale(.4)}
  25% {opacity:1;transform:translateY(-20px) scale(1.25)}
  60% {opacity:1;transform:translateY(-40px) scale(1.05)}
  100%{opacity:0;transform:translateY(-70px) scale(.9)}
}
.score-pop{
  position:fixed;pointer-events:none;z-index:300;
  font-size:26px;font-weight:900;letter-spacing:-1px;
  animation:scorePop 1.1s var(--ease-soft) forwards;
  text-shadow:0 4px 12px rgba(0,0,0,0.15);
}

/* =================================================================
   RANKING
   ================================================================= */
.rank-item{
  display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:16px;margin-bottom:6px;
  transition:all .2s;
}
.rank-item:hover{background:rgba(0,0,0,0.02)}
.rank-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0}
.rank-1{background:linear-gradient(135deg,#ffd700,#f0a500);color:#fff;box-shadow:0 4px 12px rgba(255,215,0,0.35)}
.rank-2{background:linear-gradient(135deg,#c0c0c0,#909090);color:#fff;box-shadow:0 4px 10px rgba(192,192,192,0.3)}
.rank-3{background:linear-gradient(135deg,#cd7f32,#a0522d);color:#fff;box-shadow:0 4px 10px rgba(205,127,50,0.3)}
.rank-orb{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-meta{font-size:11px;color:var(--text-2)}
.rank-score{font-size:16px;font-weight:800;color:#e8910a;flex-shrink:0}

/* =================================================================
   SHOP
   ================================================================= */
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));gap:12px}
.shop-item{
  background:var(--card-bg);border-radius:18px;padding:18px 14px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  border:1px solid var(--border);transition:all .25s;
  box-shadow:0 2px 8px rgba(0,0,0,0.04);
}
.shop-item:hover{border-color:rgba(234,145,10,0.3);transform:translateY(-2px);box-shadow:0 6px 18px rgba(234,187,92,0.15)}
.shop-icon{font-size:34px}
.shop-name{font-size:13px;font-weight:700;text-align:center}
.shop-desc{font-size:11px;color:var(--text-3);text-align:center}
.shop-price{font-size:12px;font-weight:700;color:#c47c0a}
.shop-stock{font-size:10px;color:var(--text-3)}

/* =================================================================
   RULES
   ================================================================= */
.rule-item{
  display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:16px;
  margin-bottom:6px;background:rgba(0,0,0,0.015);transition:all .2s;
}
.rule-item:hover{background:rgba(0,0,0,0.03)}
.rule-cat{padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700;flex-shrink:0}
.rule-cat-learning{background:#dbeafe;color:#2563eb}
.rule-cat-behavior{background:#fef3c7;color:#d97706}
.rule-cat-health{background:#d1fae5;color:#059669}
.rule-cat-other{background:#ede9fe;color:#7c3aed}
.rule-name{flex:1;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rule-pts{font-size:16px;font-weight:800;flex-shrink:0}
.rule-pts.pos{color:#10b981}.rule-pts.neg{color:#ef4444}

/* =================================================================
   ANIMATIONS
   ================================================================= */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes cardIn{from{opacity:0;transform:translateY(16px) scale(.94)}to{opacity:1;transform:translateY(0) scale(1)}}
.pet-card{animation:cardIn .45s var(--ease-bounce) both}
.pet-card:nth-child(1){animation-delay:0s}
.pet-card:nth-child(2){animation-delay:.04s}
.pet-card:nth-child(3){animation-delay:.08s}
.pet-card:nth-child(4){animation-delay:.12s}
.pet-card:nth-child(5){animation-delay:.16s}
.pet-card:nth-child(6){animation-delay:.20s}

/* Responsive */
@media(max-width:640px){
  .garden{grid-template-columns:repeat(auto-fill, minmax(155px, 1fr));gap:10px}
  .pet-image-area{min-height:170px}
  .pet-orb{width:85px;height:85px}
  .pet-face{font-size:38px}
  .topbar{padding:0 12px}.search-box{max-width:140px}
  .modal{max-width:100%}
}
</style>
</head>
<body data-theme="light">
<div class="app" id="app">

  <!-- ====== TOPBAR ====== -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="logo-text">ClassPet</span>
      <div class="select-wrap">
        <select id="classSelect" onchange="switchClass()">
          <option value="1">🐾 我的班级</option>
        </select>
      </div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索学生..." oninput="filterStudents()">
      </div>
    </div>
    <div class="topbar-right">
      <button class="btn-icon" id="themeToggle" onclick="toggleTheme()" title="切换暗色模式">🌓</button>
      <div class="dropdown" id="hamburgerMenu">
        <button class="btn-icon" onclick="toggleHamburger()">☰</button>
        <div class="dropdown-menu" id="hamburgerDropdown" style="display:none;">
          <button onclick="sortGarden('score')">⭐ 按积分</button>
          <button onclick="sortGarden('exp')">📈 按经验</button>
          <button onclick="sortGarden('badges')">🏅 按徽章</button>
          <button onclick="sortGarden('name')">🔤 按姓名</button>
          <div class="divider"></div>
          <button onclick="addStudent()">➕ 添加学生</button>
        </div>
      </div>
      <div class="dropdown" id="userMenu">
        <button class="btn-ghost" onclick="toggleUserMenu()" id="userBtn">👤 老师</button>
        <div class="dropdown-menu" id="userDropdown" style="display:none;">
          <button onclick="showInviteTeacher()">📨 邀请教师</button>
          <button onclick="shareParent()">👨‍👩‍👧 分享家长</button>
          <div class="divider"></div>
          <button onclick="logout()">🚪 退出登录</button>
        </div>
      </div>
    </div>
  </header>

  <!-- ====== MAIN GARDEN ====== -->
  <main class="main-scroll" id="gardenScroll">
    <div style="max-width:var(--maxw);width:100%;">
      <div class="vs-bar" id="vsBar">
        <div class="vs-team"><span class="name">🦊 红狐队</span><span class="score" id="redScore">0</span></div>
        <div class="vs-vs">VS</div>
        <div class="vs-team"><span class="name">🐲 青龙队</span><span class="score" id="blueScore">0</span></div>
      </div>
      <div class="garden" id="garden"></div>
    </div>
  </main>

  <!-- ====== ACTION BAR ====== -->
  <div id="actionBar" class="action-bar" style="display:none;">
    <span style="font-size:12px;font-weight:700;color:var(--text-2);margin-right:2px" id="actionLabel">已选 0 人</span>
    <button class="btn btn-pos" onclick="quickScore(1)">+1</button>
    <button class="btn btn-pos" onclick="quickScore(5)">+5</button>
    <button class="btn btn-neg" onclick="quickScore(-1)">-1</button>
    <button class="btn btn-neg" onclick="quickScore(-5)">-5</button>
    <button class="btn-ghost-sm" onclick="clearSelection()">取消</button>
  </div>

  <!-- ====== TABBAR ====== -->
  <nav class="tabbar">
    <button class="tab-btn active" data-tab="ranking" onclick="openTab('ranking')">
      <span class="tab-icon">📊</span>排行榜
    </button>
    <button class="tab-btn" data-tab="shop" onclick="openTab('shop')">
      <span class="tab-icon">🛒</span>小卖部
    </button>
    <button class="tab-btn" data-tab="history" onclick="openTab('history')">
      <span class="tab-icon">📋</span>评价记录
    </button>
    <button class="tab-btn" data-tab="rules" onclick="openTab('rules')">
      <span class="tab-icon">⚙️</span>规则
    </button>
    <button class="tab-btn" data-tab="quick" onclick="openTab('quick')">
      <span class="tab-icon">⚡</span>快速
    </button>
  </nav>

  <!-- ====== MODAL ====== -->
  <div id="modalOverlay" class="overlay" style="display:none;" onclick="if(event.target===this)closeModal()"></div>
</div>

<script>
// ============================================================
// Pet-Zone v3 — Application Logic
// ============================================================

const PETS = {
  cat:    { icon:'🐱', name:'小猫咪', main:'#ff9966' },
  dog:    { icon:'🐶', name:'小狗狗', main:'#f5a623' },
  rabbit: { icon:'🐰', name:'小兔兔', main:'#ff8eb3' },
  panda:  { icon:'🐼', name:'小熊猫', main:'#7ec850' },
  chick:  { icon:'🐤', name:'小黄鸡', main:'#ffd43b' },
  turtle: { icon:'🐢', name:'小乌龟', main:'#4ecdc4' },
  hamster:{ icon:'🐹', name:'小仓鼠', main:'#e0a458' },
  fox:    { icon:'🦊', name:'小狐狸', main:'#ff6b4a' },
};

let students = [];
let selectedStudentId = null;
let sortMode = 'score';

function initDemoData() {
  const names = ['张小明','李华','王芳','赵强','陈静','刘洋','周敏','吴磊','郑丽','钱伟','孙悦','杨帆','朱峰','马超','胡琳'];
  const petTypes = ['cat','dog','rabbit','panda','chick','turtle','hamster','fox'];
  students = names.map((name,i) => {
    const pt = petTypes[i % petTypes.length];
    const pet = PETS[pt];
    const exp = Math.floor(Math.random()*400)+10;
    const thresholds = [0,5,20,50,100,180,300,500,999];
    let lv=1; for(let j=8;j>=1;j--){if(exp>=thresholds[j-1]){lv=j;break;}}
    return {
      id:i+1,name,number:String(i+1).padStart(2,'0'),
      petType:pt,petIcon:pet.icon,petName:pet.name,
      exp,lv,nextExp:thresholds[lv],
      score:Math.floor(Math.random()*200)-20,
      badges:Math.floor(Math.random()*15)
    };
  });
}

function renderGarden() {
  const container = document.getElementById('garden');
  let list = [...students];
  const q = (document.getElementById('searchInput')?.value||'').toLowerCase();
  if(q) list = list.filter(s => s.name.includes(q) || s.petName.includes(q));

  if(sortMode==='exp') list.sort((a,b)=>b.exp-a.exp);
  else if(sortMode==='name') list.sort((a,b)=>a.name.localeCompare(b.name,'zh'));
  else if(sortMode==='badges') list.sort((a,b)=>b.badges-a.badges);
  else list.sort((a,b)=>b.score-a.score);

  container.innerHTML = list.map(s => {
    const sel = selectedStudentId===s.id;
    const pct = Math.min(100, s.exp/s.nextExp*100);
    // Level shield SVG
    const shield = `<svg viewBox="0 0 24 24" fill="none"><path d="M12 2L3 7v5c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V7l-9-5z" fill="#6f63f4" stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/><text x="12" y="16" text-anchor="middle" fill="#fff" font-size="10" font-weight="800">${s.lv}</text></svg>`;

    return `
    <div class="pet-card pet-${s.petType}${sel?' selected':''}"
         draggable="true" data-id="${s.id}"
         onclick="selectStudent(${s.id})"
         ondragstart="dragStart(event,${s.id})"
         ondragover="dragOver(event)" ondragleave="dragLeave(event)"
         ondrop="dragDrop(event,${s.id})" ondragend="dragEnd(event)">

      <!-- Pet Image Area -->
      <div class="pet-image-area">
        <div class="pet-score-badge">⭐ ${s.score}</div>
        <div class="pet-orb breathing">
          <div class="pet-face">${s.petIcon}</div>
        </div>
        <div class="pet-name-tag">${s.petName}</div>
      </div>

      <!-- Separator -->
      <div class="pet-sep"></div>

      <!-- Info Area -->
      <div class="pet-info">
        <div class="student-name-row">
          <span class="student-name">${s.name}</span>
          <span class="student-number">#${s.number}</span>
        </div>
        <div class="pet-level-row">
          <span class="pet-level-icon">${shield}</span>
          <span class="pet-level-text">Lv.${s.lv} · ${s.badges} 🏅</span>
        </div>
        <div class="exp-bar"><div class="exp-fill" style="width:${pct}%"></div></div>
        <div class="exp-text">${s.exp} / ${s.nextExp} EXP</div>
      </div>
    </div>`;
  }).join('');
}

function selectStudent(id) {
  if(selectedStudentId===id){clearSelection();return}
  selectedStudentId=id;
  const s=students.find(st=>st.id===id);
  document.getElementById('actionBar').style.display='flex';
  document.getElementById('actionLabel').textContent=s?`${s.name}`:'已选 1 人';
  renderGarden();
}
function clearSelection(){selectedStudentId=null;document.getElementById('actionBar').style.display='none';renderGarden()}

function quickScore(pts) {
  if(!selectedStudentId)return;
  const s=students.find(st=>st.id===selectedStudentId);if(!s)return;
  s.score+=pts;if(pts>0)s.exp+=Math.abs(pts)*2;
  const thresholds=[0,5,20,50,100,180,300,500,999];
  for(let lv=8;lv>=1;lv--){if(s.exp>=thresholds[lv-1]){s.lv=lv;s.nextExp=thresholds[lv];break;}}
  // Pop
  const pop=document.createElement('div');pop.className='score-pop';
  pop.textContent=(pts>0?'+':'')+pts;
  pop.style.color=pts>0?'#10b981':'#ef4444';
  document.body.appendChild(pop);
  const card=document.querySelector(`.pet-card[data-id="${s.id}"]`);
  if(card){const r=card.getBoundingClientRect();pop.style.left=r.left+r.width/2-30+'px';pop.style.top=r.top+60+'px'}
  setTimeout(()=>pop.remove(),1100);
  renderGarden();
}

function dragStart(e,id){e.dataTransfer.setData('text/plain',id);e.currentTarget.classList.add('dragging')}
function dragOver(e){e.preventDefault();const c=e.currentTarget.closest('.pet-card');if(c&&!c.classList.contains('dragging'))c.classList.add('drag-over')}
function dragLeave(e){e.currentTarget.classList.remove('drag-over')}
function dragDrop(e,targetId){e.preventDefault();e.currentTarget.classList.remove('drag-over');const srcId=parseInt(e.dataTransfer.getData('text/plain'));if(srcId===targetId)return;const si=students.findIndex(s=>s.id===srcId),ti=students.findIndex(s=>s.id===targetId);if(si===-1||ti===-1)return;const [m]=students.splice(si,1);students.splice(ti,0,m);renderGarden()}
function dragEnd(e){document.querySelectorAll('.pet-card').forEach(c=>c.classList.remove('dragging','drag-over'))}

function sortGarden(mode){sortMode=mode;renderGarden();document.getElementById('hamburgerDropdown').style.display='none'}
function filterStudents(){renderGarden()}

function toggleTheme(){
  const el=document.documentElement;
  const cur=el.getAttribute('data-theme'),nxt=cur==='dark'?'light':'dark';
  el.setAttribute('data-theme',nxt);document.body.setAttribute('data-theme',nxt);
}

// ─── Tabs ───
function openTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  const ov=document.getElementById('modalOverlay');ov.style.display='flex';
  let h='';
  if(tab==='ranking')h=renderRanking();
  else if(tab==='shop')h=renderShop();
  else if(tab==='rules')h=renderRules();
  else if(tab==='history')h=renderHistory();
  else if(tab==='quick')h=renderQuick();
  ov.innerHTML=`<div class="modal" onclick="event.stopPropagation()">${h}</div>`;
}
function closeModal(){document.getElementById('modalOverlay').style.display='none';document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'))}

function renderRanking(){
  const sorted=[...students].sort((a,b)=>b.score-a.score).slice(0,10);
  const items=sorted.map((s,i)=>{
    const r=i+1,rc=r===1?'rank-1':r===2?'rank-2':r===3?'rank-3':'';
    const medal=['🥇','🥈','🥉'][i]||r;
    const orbBg=PETS[s.petType]?.main||'#ccc';
    return `<div class="rank-item">
      <div class="rank-num ${rc}">${medal}</div>
      <div class="rank-orb" style="background:radial-gradient(circle at 35% 28%,${orbBg}88,${orbBg});font-size:18px">${s.petIcon}</div>
      <div class="rank-info"><div class="rank-name">${s.name} · ${s.petName}</div><div class="rank-meta">Lv.${s.lv} · 🏅${s.badges}</div></div>
      <div class="rank-score">${s.score}</div>
    </div>`;
  }).join('');
  return `<div class="modal-header"><span class="modal-title">🏆 排行榜</span><button class="modal-close" onclick="closeModal()">✕</button></div>${items}`;
}

function renderShop(){
  const items=[
    {icon:'🎁',name:'免作业卡',desc:'免除一次作业',price:'🏅×3',stock:10},
    {icon:'🎫',name:'免值日卡',desc:'免除一次值日',price:'🏅×2',stock:15},
    {icon:'🌟',name:'加分卡',desc:'获得+5积分',price:'⭐×10',stock:20},
    {icon:'🛡️',name:'保护卡',desc:'防止一次扣分',price:'🏅×5',stock:5},
    {icon:'🎨',name:'换肤卡',desc:'更换宠物皮肤',price:'🏅×8',stock:3},
    {icon:'👑',name:'特权卡',desc:'一天特权体验',price:'🏅×10',stock:2},
  ];
  const html=items.map(i=>`
    <div class="shop-item">
      <span class="shop-icon">${i.icon}</span><div class="shop-name">${i.name}</div>
      <div class="shop-desc">${i.desc}</div><div class="shop-price">${i.price}</div>
      <div class="shop-stock">库存 ${i.stock}</div>
    </div>`).join('');
  return `<div class="modal-header"><span class="modal-title">🛒 积分小卖部</span><button class="modal-close" onclick="closeModal()">✕</button></div><div class="shop-grid">${html}</div>`;
}

function renderRules(){
  const rules=[
    {cat:'learning',n:'学习',name:'作业完成优秀',pts:3,kind:'pos'},
    {cat:'learning',n:'学习',name:'课堂上积极发言',pts:2,kind:'pos'},
    {cat:'behavior',n:'行为',name:'帮助同学',pts:2,kind:'pos'},
    {cat:'behavior',n:'行为',name:'迟到',pts:-1,kind:'neg'},
    {cat:'health',n:'健康',name:'课间操认真做',pts:1,kind:'pos'},
    {cat:'other',n:'其他',name:'教室卫生保持好',pts:1,kind:'pos'},
  ];
  const html=rules.map(r=>`
    <div class="rule-item">
      <span class="rule-cat rule-cat-${r.cat}">${r.n}</span>
      <span class="rule-name">${r.name}</span>
      <span class="rule-pts ${r.kind}">${r.pts>0?'+':''}${r.pts}</span>
    </div>`).join('');
  return `<div class="modal-header"><span class="modal-title">⚙️ 规则设置</span><button class="modal-close" onclick="closeModal()">✕</button></div>${html}`;
}

function renderHistory(){
  const logs=[
    {name:'张小明',action:'作业完成优秀',pts:3,time:'今天 14:30'},
    {name:'李华',action:'课堂上积极发言',pts:2,time:'今天 14:25'},
    {name:'王芳',action:'迟到',pts:-1,time:'今天 14:20'},
    {name:'赵强',action:'帮助同学',pts:2,time:'今天 14:15'},
  ];
  const html=logs.map(l=>`
    <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:14px;margin-bottom:6px;background:var(--card-bg)">
      <span style="font-size:20px">${l.pts>0?'👍':'👎'}</span>
      <div style="flex:1"><div style="font-size:13px;font-weight:700">${l.name}</div><div style="font-size:11px;color:var(--text-3)">${l.action}</div></div>
      <span style="font-weight:800;color:${l.pts>0?'#10b981':'#ef4444'}">${l.pts>0?'+':''}${l.pts}</span>
      <span style="font-size:10px;color:var(--text-3)">${l.time}</span>
    </div>`).join('');
  return `<div class="modal-header"><span class="modal-title">📋 评价记录</span><button class="modal-close" onclick="closeModal()">✕</button></div>${html}`;
}

function renderQuick(){
  return `<div class="modal-header"><span class="modal-title">⚡ 快速操作</span><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px">
    <button class="btn btn-pos" onclick="quickScoreAll(1)" style="padding:16px;font-size:14px">👍 全员+1</button>
    <button class="btn btn-pos" onclick="quickScoreAll(3)" style="padding:16px;font-size:14px">🌟 全员+3</button>
    <button class="btn btn-neg" onclick="quickScoreAll(-1)" style="padding:16px;font-size:14px">👎 全员-1</button>
    <button class="btn-ghost-sm" onclick="resetAll()" style="padding:16px;font-size:14px;grid-column:span 2">🔄 重置所有积分</button>
  </div>`;
}
function quickScoreAll(pts){students.forEach(s=>{s.score+=pts;if(pts>0)s.exp+=Math.abs(pts)});closeModal();renderGarden()}
function resetAll(){students.forEach(s=>{s.score=0});closeModal();renderGarden()}

function toggleHamburger(){const d=document.getElementById('hamburgerDropdown');d.style.display=d.style.display==='none'?'block':'none'}
function toggleUserMenu(){const d=document.getElementById('userDropdown');d.style.display=d.style.display==='none'?'block':'none'}

document.addEventListener('click',e=>{
  if(!e.target.closest('#hamburgerMenu'))document.getElementById('hamburgerDropdown').style.display='none';
  if(!e.target.closest('#userMenu'))document.getElementById('userDropdown').style.display='none';
});

initDemoData();renderGarden();
</script>
</body>
</html>
