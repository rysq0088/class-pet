<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>打印二维码卡片 - ClassPet</title>
<style>
@media print {
  body{margin:0;padding:0}
  .no-print{display:none!important}
  @page{size:A4;margin:10mm}
  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:4mm;page-break-inside:avoid}
  .card{border:1px dashed #aaa;padding:3mm;text-align:center;break-inside:avoid}
}
@media screen {
  body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:20px;background:#f5f5f5}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
  .card{background:#fff;border:2px dashed #ddd;border-radius:12px;padding:12px;text-align:center}
}
.card .name{font-size:13px;font-weight:700;margin:4px 0}
.card .code{font-size:10px;color:#999;word-break:break-all}
.card .pet{font-size:36px;margin:6px 0}
.no-print{padding:12px 0;text-align:center}
.btn-print{padding:10px 28px;background:#2e7d32;color:#fff;border:none;border-radius:20px;font-size:14px;font-weight:700;cursor:pointer}
.btn-print:active{transform:scale(.96)}
/* QR placeholder */
.qr-box{width:60px;height:60px;margin:0 auto;border:2px solid #eee;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:28px}
</style>
</head>
<body>
<div class="no-print" style="margin-bottom:16px">
  <h2>🖨️ 二维码卡片打印</h2>
  <p style="color:#666;font-size:13px">每个小朋友一张卡片，剪下来发给家长<br>家长微信扫码即可查看孩子的宠物</p>
  <button class="btn-print" onclick="window.print()">🖨️ 打印</button>
</div>
<div class="cards" id="cards">加载中...</div>

<script>
async function load(){
  try{
    const r=await fetch('/api/me');
    const d=await r.json();
    if(!d.teacher){location.href='/login';return}

    const cr=await fetch('/api/classes');
    const cd=await cr.json();
    if(!cd.classes||!cd.classes.length){document.getElementById('cards').innerHTML='<p>还没有班级</p>';return}
    
    const cls=cd.classes[0];
    const sr=await fetch('/api/classes/'+cls.id+'/students');
    const sd=await sr.json();
    const students=sd.students||[];

    const PETS={cat:'🐱',dog:'🐶',rabbit:'🐰',panda:'🐼',chick:'🐤',turtle:'🐢',hamster:'🐹',fox:'🦊'};
    const origin=location.origin;

    document.getElementById('cards').innerHTML=students.map(s=>`
      <div class="card">
        <div class="pet">${PETS[s.pet_type]||'🐱'}</div>
        <div class="name">${s.name}的宠物</div>
        <div class="qr-box">📱</div>
        <div class="code">${origin}/parent/${cls.invite_code}/${s.id}</div>
      </div>
    `).join('');
  }catch(e){location.href='/login'}
}
load();
</script>
</body>
</html>
